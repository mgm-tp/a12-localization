packages:
  - codemod
  - localization
  - localization-react
  - documentation

catalogs:
  a12ranges:
    "@com.mgmtp.a12.devtools/codemod": 2.1.0
    "@com.mgmtp.a12.devtools/eslint-config": 3.1.0
    "@com.mgmtp.a12.devtools/prettier-config": 1.1.0
    "@com.mgmtp.a12.devtools/tsconfig": 1.1.0
  fix:
    react: 19.2.3
  ranges:
    "@types/big.js": ^6.2.2
    "@types/luxon": ^3.7.1
    "@types/mocha": ^10.0.10
    "@types/node": ^24.12.0
    "@types/react": ^19.2.14
    asciidoctor: ^3.0.4
    asciidoctor-highlight.js: ^0.4.0
    big.js: ^7.0.1
    cspell: ^9.7.0
    eslint: ^9.39.4
    eslint-plugin-import: ^2.32.0
    eslint-plugin-no-null: ^1.0.2
    eslint-plugin-notice: ^1.0.0
    eslint-plugin-workspaces: ^0.11.1
    highlight.js: ^11.11.1
    luxon: ^3.7.2
    mocha: ^11.7.5
    prettier: ^3.8.1
    react: ^19.0.0
    rimraf: ^6.1.3
    source-map-support: ^0.5.21
    ts-morph: ^27.0.2
    typedoc: ^0.28.18
    typescript: ^5.9.3

# enforce version constraints from package.json
engineStrict: true

# do not check git status when publishing
gitChecks: false

# do not allow any postinstall scripts
allowBuilds:
  esbuild: false

# CI sets this to warn by default
loglevel: info

# prevent pnpm >10 from self-upgrading,
# since it doesn't use the global node_modules as target
pmOnFail: ignore

# enforce new packages to be at least 1 week old, except our own
minimumReleaseAge: 10080
minimumReleaseAgeExclude:
  - '@com.mgmtp.a12.*/*'
  # temporary workarounds for cves
  - brace-expansion
  - handlebars
  - serialize-javascript
  - picomatch
  - yaml

overrides:
  lodash: ">=4.17.24"
  "diff@>=6.0.0": ">=8.0.3" # latest mocha (11.7.5) still depends on diff ^7.0.0
  serialize-javascript: ">=7.0.5" # latest mocha (11.7.5) depends on serialize-javascript ^6.0.2

peerDependencyRules:
  allowedVersions:
    "asciidoctor-highlight.js@0.4>@asciidoctor/core": "3"

# ensure latest deps are installed when updating for audit
resolutionMode: highest

# do not install packages where trust level decreased
trustPolicy: no-downgrade
